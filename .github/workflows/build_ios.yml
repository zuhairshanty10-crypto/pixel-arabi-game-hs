name: Export iOS Game (IPA)

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: # Allows manual trigger from Actions tab

jobs:
  export-ios:
    name: Export to iOS (.ipa)
    runs-on: macos-latest
    
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        
      - name: Setup Godot 4
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.4.0
          use-dotnet: false
          include-templates: true
          
      - name: Create export directory
        run: mkdir -p ios_build
        
      - name: Force Asset Import
        run: godot --headless --editor --quit-after 60 || true
        
      - name: Export Godot iOS Project
        run: |
          # Headless export to Xcode project
          godot --headless --export-release "iOS" ios_build/PixelArabi.xcodeproj
          
      - name: Build Xcode Project (Unsigned for AltStore)
        run: |
          cd ios_build
          # Build the raw unsupported App bundle (Fakesign)
          xcodebuild -project PixelArabi.xcodeproj \
            -scheme "PixelArabi" \
            -configuration Release \
            -destination "generic/platform=iOS" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build | xcpretty
            
      - name: Package into .ipa
        run: |
          # AltStore expects a Payload folder packed into a .ipa zip
          mkdir -p Payload
          # Move the compiled .app into the Payload directory
          mv ios_build/build/Release-iphoneos/*.app Payload/
          zip -r PixelArabi.ipa Payload
          
      - name: Upload .ipa Artifact
        uses: actions/upload-artifact@v4
        with:
          name: PixelArabi-iOS-App
          path: PixelArabi.ipa
          retention-days: 7
